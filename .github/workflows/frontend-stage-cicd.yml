name: Frontend Stage CI/CD

on:
  push:
    branches:
      - main
      - stage
      - production
  pull_request:
    branches:
      - main
      - stage
  workflow_dispatch:

concurrency:
  group: frontend-stage-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  quality-and-build:
    name: Quality Checks + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
      NEXT_PUBLIC_APP_NAME: "WeForYou"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight checks
        shell: bash
        run: |
          test -f package.json || (echo "package.json not found at repo root" && exit 1)
          test -f package-lock.json || (echo "package-lock.json not found at repo root" && exit 1)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Prepare production env for build
        shell: bash
        run: |
          API_BASE="${NEXT_PUBLIC_API_BASE_URL:-https://wfubackend.trickwave.com}"
          API_URL="${NEXT_PUBLIC_API_URL:-https://wfubackend.trickwave.com/api/v1}"
          APP_URL="${NEXT_PUBLIC_APP_URL:-https://wfubackend.trickwave.com}"
          cat > .env.production <<EOF
          NEXT_PUBLIC_API_BASE_URL=${API_BASE}
          NEXT_PUBLIC_API_URL=${API_URL}
          NEXT_PUBLIC_APP_URL=${APP_URL}
          NEXT_PUBLIC_APP_NAME=WeForYou
          EOF

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Run tests if present
        shell: bash
        run: |
          if npm run | grep -qE "^[[:space:]]+test"; then
            npm test -- --ci
          else
            echo "No test script found; skipping tests."
          fi

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-stage
          path: |
            .next
            package.json
            package-lock.json
            next.config.js
            .env.production
          if-no-files-found: error
          retention-days: 7

  deploy-stage:
    name: Deploy to Stage Server
    runs-on: ubuntu-latest
    needs: quality-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/stage'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        shell: bash
        run: |
          test -n "${{ secrets.STAGE_HOST }}" || (echo "Missing secret: STAGE_HOST" && exit 1)
          test -n "${{ secrets.STAGE_USER }}" || (echo "Missing secret: STAGE_USER" && exit 1)
          test -n "${{ secrets.STAGE_APP_PATH }}" || (echo "Missing secret: STAGE_APP_PATH" && exit 1)
          test -n "${{ secrets.STAGE_SSH_PRIVATE_KEY }}" || (echo "Missing secret: STAGE_SSH_PRIVATE_KEY" && exit 1)
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.STAGE_HOST }}" >> ~/.ssh/known_hosts

      - name: Clean stage app directory first
        shell: bash
        run: |
          ssh "${{ secrets.STAGE_USER }}@${{ secrets.STAGE_HOST }}" << 'EOF'
            set -e
            if [ -z "${{ secrets.STAGE_APP_PATH }}" ] || [ "${{ secrets.STAGE_APP_PATH }}" = "/" ]; then
              echo "Unsafe STAGE_APP_PATH. Aborting."
              exit 1
            fi
            mkdir -p "${{ secrets.STAGE_APP_PATH }}"
            find "${{ secrets.STAGE_APP_PATH }}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          EOF

      - name: Sync source to stage server
        shell: bash
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".next" \
            --exclude ".github" \
            --exclude ".env" \
            --exclude ".env.local" \
            --exclude ".env.development.local" \
            --exclude ".env.test.local" \
            --exclude ".env.production.local" \
            ./ \
            "${{ secrets.STAGE_USER }}@${{ secrets.STAGE_HOST }}:${{ secrets.STAGE_APP_PATH }}/"

      - name: Build and restart app on stage server
        shell: bash
        run: |
          ssh "${{ secrets.STAGE_USER }}@${{ secrets.STAGE_HOST }}" << 'EOF'
            set -e
            cd "${{ secrets.STAGE_APP_PATH }}"

            cat > .env.production << EOT
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_APP_NAME=WeForYou
            EOT

            if [ -z "${{ secrets.NEXT_PUBLIC_API_BASE_URL }}" ]; then
              sed -i 's|^NEXT_PUBLIC_API_BASE_URL=$|NEXT_PUBLIC_API_BASE_URL=https://wfubackend.trickwave.com|' .env.production
            fi
            if [ -z "${{ secrets.NEXT_PUBLIC_API_URL }}" ]; then
              sed -i 's|^NEXT_PUBLIC_API_URL=$|NEXT_PUBLIC_API_URL=https://wfubackend.trickwave.com/api/v1|' .env.production
            fi
            if [ -z "${{ secrets.NEXT_PUBLIC_APP_URL }}" ]; then
              sed -i 's|^NEXT_PUBLIC_APP_URL=$|NEXT_PUBLIC_APP_URL=https://wfubackend.trickwave.com|' .env.production
            fi

            npm install --legacy-peer-deps
            npm run build

            if [ ! -d ".next" ]; then
              echo "ERROR: .next directory was not generated."
              echo "Current directory contents:"
              ls -la
              exit 1
            fi

            echo "Build output present. .next generated successfully."
            ls -la .next | head -n 20

            if command -v pm2 >/dev/null 2>&1; then
              pm2 describe weforyou-frontend >/dev/null 2>&1 && pm2 restart weforyou-frontend || pm2 start npm --name weforyou-frontend -- run start -- -p 3000
              pm2 save
            else
              echo "PM2 not installed on server. Install PM2 or add custom restart command."
              exit 1
            fi
          EOF

  sync-stage-from-main:
    name: Sync stage branch from main
    runs-on: ubuntu-latest
    needs: quality-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force stage to main commit
        shell: bash
        run: |
          git fetch origin main stage || true
          git push --force origin "${GITHUB_SHA}:refs/heads/stage"

  sync-production-from-stage:
    name: Sync production branch from stage
    runs-on: ubuntu-latest
    needs: sync-stage-from-main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force production to stage commit
        shell: bash
        run: |
          git fetch origin stage production || true
          STAGE_SHA="$(git rev-parse origin/stage)"
          git push --force origin "${STAGE_SHA}:refs/heads/production"

  deploy-production:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: quality-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/production'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        shell: bash
        run: |
          test -n "${{ secrets.PRODUCTION_HOST }}" || (echo "Missing secret: PRODUCTION_HOST" && exit 1)
          test -n "${{ secrets.PRODUCTION_USER }}" || (echo "Missing secret: PRODUCTION_USER" && exit 1)
          test -n "${{ secrets.PRODUCTION_APP_PATH }}" || (echo "Missing secret: PRODUCTION_APP_PATH" && exit 1)
          test -n "${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}" || (echo "Missing secret: PRODUCTION_SSH_PRIVATE_KEY" && exit 1)
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.PRODUCTION_HOST }}" >> ~/.ssh/known_hosts

      - name: Clean production app directory first
        shell: bash
        run: |
          ssh "${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }}" << 'EOF'
            set -e
            if [ -z "${{ secrets.PRODUCTION_APP_PATH }}" ] || [ "${{ secrets.PRODUCTION_APP_PATH }}" = "/" ]; then
              echo "Unsafe PRODUCTION_APP_PATH. Aborting."
              exit 1
            fi
            mkdir -p "${{ secrets.PRODUCTION_APP_PATH }}"
            find "${{ secrets.PRODUCTION_APP_PATH }}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          EOF

      - name: Sync source to production server
        shell: bash
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".next" \
            --exclude ".github" \
            --exclude ".env" \
            --exclude ".env.local" \
            --exclude ".env.development.local" \
            --exclude ".env.test.local" \
            --exclude ".env.production.local" \
            ./ \
            "${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }}:${{ secrets.PRODUCTION_APP_PATH }}/"

      - name: Build and restart app on production server
        shell: bash
        run: |
          ssh "${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }}" << 'EOF'
            set -e
            cd "${{ secrets.PRODUCTION_APP_PATH }}"

            cat > .env.production << EOT
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_APP_NAME=WeForYou
            EOT

            if [ -z "${{ secrets.NEXT_PUBLIC_API_BASE_URL }}" ]; then
              sed -i 's|^NEXT_PUBLIC_API_BASE_URL=$|NEXT_PUBLIC_API_BASE_URL=https://wfubackend.trickwave.com|' .env.production
            fi
            if [ -z "${{ secrets.NEXT_PUBLIC_API_URL }}" ]; then
              sed -i 's|^NEXT_PUBLIC_API_URL=$|NEXT_PUBLIC_API_URL=https://wfubackend.trickwave.com/api/v1|' .env.production
            fi
            if [ -z "${{ secrets.NEXT_PUBLIC_APP_URL }}" ]; then
              sed -i 's|^NEXT_PUBLIC_APP_URL=$|NEXT_PUBLIC_APP_URL=https://wfubackend.trickwave.com|' .env.production
            fi

            npm install --legacy-peer-deps
            npm run build

            if [ ! -d ".next" ]; then
              echo "ERROR: .next directory was not generated on production."
              ls -la
              exit 1
            fi

            if command -v pm2 >/dev/null 2>&1; then
              pm2 describe weforyou-frontend-prod >/dev/null 2>&1 && pm2 restart weforyou-frontend-prod || pm2 start npm --name weforyou-frontend-prod -- run start -- -p 3000
              pm2 save
            else
              echo "PM2 not installed on production server."
              exit 1
            fi
          EOF
