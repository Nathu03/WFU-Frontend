name: Frontend Stage CI/CD

on:
  push:
    branches:
      - stage
  pull_request:
    branches:
      - stage
  workflow_dispatch:

concurrency:
  group: frontend-stage-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-and-build:
    name: Quality Checks + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    env:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL || 'https://wfubackend.trickwave.com' }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://wfubackend.trickwave.com/api/v1' }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'https://wfubackend.trickwave.com' }}
      NEXT_PUBLIC_APP_NAME: "WeForYou"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Run tests if present
        shell: bash
        run: |
          if npm run | grep -qE "^[[:space:]]+test"; then
            npm test -- --ci
          else
            echo "No test script found; skipping tests."
          fi

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-stage
          path: |
            .next
            package.json
            package-lock.json
            next.config.js
            .env.production
          if-no-files-found: error
          retention-days: 7

  deploy-stage:
    name: Deploy to Stage Server
    runs-on: ubuntu-latest
    needs: quality-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/stage'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.STAGE_HOST }}" >> ~/.ssh/known_hosts

      - name: Clean stage app directory first
        shell: bash
        run: |
          ssh "${{ secrets.STAGE_USER }}@${{ secrets.STAGE_HOST }}" << 'EOF'
            set -e
            mkdir -p "${{ secrets.STAGE_APP_PATH }}"
            find "${{ secrets.STAGE_APP_PATH }}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          EOF

      - name: Sync source to stage server
        shell: bash
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".next" \
            --exclude ".github" \
            --exclude ".env" \
            --exclude ".env.local" \
            --exclude ".env.development.local" \
            --exclude ".env.test.local" \
            --exclude ".env.production.local" \
            ./ \
            "${{ secrets.STAGE_USER }}@${{ secrets.STAGE_HOST }}:${{ secrets.STAGE_APP_PATH }}/"

      - name: Build and restart app on stage server
        shell: bash
        run: |
          ssh "${{ secrets.STAGE_USER }}@${{ secrets.STAGE_HOST }}" << 'EOF'
            set -e
            cd "${{ secrets.STAGE_APP_PATH }}"

            cat > .env.production << EOT
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL || 'https://wfubackend.trickwave.com' }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL || 'https://wfubackend.trickwave.com/api/v1' }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL || 'https://wfubackend.trickwave.com' }}
            NEXT_PUBLIC_APP_NAME=WeForYou
            EOT

            npm ci
            npm run build

            if command -v pm2 >/dev/null 2>&1; then
              pm2 describe weforyou-frontend >/dev/null 2>&1 && pm2 restart weforyou-frontend || pm2 start "npm run start -- -p 3000" --name weforyou-frontend
              pm2 save
            else
              echo "PM2 not installed on server. Install PM2 or add custom restart command."
              exit 1
            fi
          EOF
